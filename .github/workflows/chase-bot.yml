name: Storm Chase Forecast Bot

on:
  schedule:
    - cron: '30 14 * 3-6 *'  # 14:30 UTC, March–June (HRRR 12Z fh=6 reliably on S3 by then)
  workflow_dispatch:           # allow manual runs from GitHub UI

jobs:
  chase:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies (cartopy/GEOS/PROJ)
        run: sudo apt-get update && sudo apt-get install -y libgeos-dev libproj-dev proj-data proj-bin

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run chase bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python chase_bot.py

      - name: Commit chase images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/chase/
          git diff --staged --quiet || git commit -m "Bot: Chase forecast $(date -u +%Y-%m-%d)"
          git push
