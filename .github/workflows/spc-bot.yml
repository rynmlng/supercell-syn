name: SPC Convective Outlook Bot

on:
  schedule:
    - cron: '35 12 * 3-6 *'  # 12:35 UTC, March–June
  workflow_dispatch:           # allow manual runs from GitHub UI

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python spc_bot.py

      - name: Commit updated outlook images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/outlooks/
          git diff --staged --quiet || git commit -m "Bot: Update SPC outlook images $(date -u +%Y-%m-%d)"
          git push
